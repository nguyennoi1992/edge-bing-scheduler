<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bing Scheduler Sidebar</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #171b2b;
      --panel: #20263a;
      --panel-2: #262d45;
      --text: #eef2ff;
      --muted: #aab4d6;
      --border: #39415f;
      --accent: #6ea8fe;
      --warn: #f2c14e;
      --error: #ff7b72;
      --ok: #51cf66;
    }
    html, body { height: 100%; }
    body {
      font-family: Segoe UI, system-ui, sans-serif;
      margin: 0;
      background: linear-gradient(180deg, #171b2b 0%, #131726 100%);
      color: var(--text);
    }
    .shell { padding: 16px; display: flex; flex-direction: column; gap: 12px; min-height: 100%; box-sizing: border-box; }
    h2 { margin: 0; font-size: 20px; }
    .row { margin: 8px 0; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .stack { display: flex; flex-direction: column; gap: 10px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
    }
    button, input[type="checkbox"] { cursor: pointer; }
    button {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
    }
    button:hover { border-color: var(--accent); }
    a { color: var(--accent); }
    small, .muted { color: var(--muted); }
    .log-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .log-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .log-list {
      flex: 1;
      min-height: 320px;
      max-height: none;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .log-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.02);
    }
    .log-line {
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .log-item.info .log-line { color: var(--text); }
    .log-item.warn .log-line { color: var(--warn); }
    .log-item.error .log-line { color: var(--error); }
    .log-item.success .log-line { color: var(--ok); }
    .empty { padding: 16px; text-align: center; color: var(--muted); border: 1px dashed var(--border); border-radius: 10px; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card stack">
      <div class="row">
        <h2>Scheduler sidebar</h2>
        <button id="runNow" type="button">Run now</button>
      </div>
      <div class="row">
        <label>
          <input id="enabled" type="checkbox" />
          Enabled
        </label>
        <a href="#" id="openOptions">Open options</a>
      </div>
      <div class="row">
        <div>Scheduled time</div>
        <div><strong id="time">—</strong></div>
      </div>
      <div class="row">
        <div>Next run</div>
        <div><small id="next">—</small></div>
      </div>
    </div>

    <div class="card" style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
      <div class="log-head">
        <strong>Recent logs</strong>
        <div class="log-actions">
          <button id="refreshLogs" type="button">Refresh</button>
          <button id="exportLogs" type="button">Export</button>
          <button id="clearLogs" type="button">Clear</button>
        </div>
      </div>
      <div style="margin-bottom:8px; font-size:12px; color: var(--muted);">Retention: last 7 days</div>
      <div id="logList" class="log-list"></div>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
